name: 'Setup Fontforge'
description: 'Build and install Fontforge'
inputs:
  repository:
    description: 'Fontforge repository'
    default: fontforge/fontforge
  ref:
    description: 'Fontforge repository'
    default: master
  path:
    description: 'Destination path'
    default: fontforge
runs:
  using: "composite"
  steps:
    - name: Checkout Fontforge
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        path: ${{ inputs.path }}
    - name: Install dependencies
      run: |
        sudo apt install \
            libjpeg-dev libtiff5-dev libpng-dev libfreetype-dev libgif-dev \
            libgtk-3-dev libxml2-dev libpango1.0-dev libcairo2-dev libspiro-dev libwoff-dev \
            python3-dev ninja-build cmake build-essential gettext
      shell: bash
    - name: Build and install Fontforge
      run: |
        cd $FFSOURCE
        mkdir build
        cd build
        cmake -GNinja -DENABLE_GUI=OFF ..
        ninja
        sudo ninja install
        cd ../..
        rm -rf $FFSOURCE
        for i in $(find /usr/local -type d -name *-packages); do \
          for j in $(find $i -name fontforge.so); do \
            echo "PYTHONPATH=$i${PYTHONPATH:+:}$PYTHONPATH" >> "$GITHUB_ENV"; \
          done; \
        done
        echo "LD_LIBRARY_PATH=/usr/local/lib${LD_LIBRARY_PATH:+:}$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
      shell: bash
      env:
        FFSOURCE: ${{ inputs.path }}
